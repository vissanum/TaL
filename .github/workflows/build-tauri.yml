name: 'Build Tauri Release'

on:
  release:
    types: [published]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # - name: Setup .env # Si TaL no usa .env.app -> .env.local, este paso se puede eliminar.
      #   run: cp .env.app .env.local

      # ... (resto del workflow igual hasta el paso de tauri-action) ...

      # ... (pasos anteriores del workflow: checkout, setup pnpm, setup node, install rust, install linux deps, install frontend deps) ...

      - name: Build and release with Tauri Action
        id: tauri_action_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true # Default es true, pero lo dejamos explícito

      - name: Create/Update latest.json with all artifacts
        # Este script se ejecutará solo una vez, preferiblemente en un job separado
        # que dependa de la matriz. Por ahora, se ejecuta en el job de Linux.
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # El script usará el 'github' context que ya está autenticado
          RELEASE_ID: ${{ github.event.release.id }}
          RAW_TAG_NAME: ${{ github.event.release.tag_name }} # Pasamos el tag completo
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // 'github' y 'context' son provistos automáticamente por actions/github-script
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release_id = parseInt(process.env.RELEASE_ID);
            const raw_tag_name = process.env.RAW_TAG_NAME;
            const app_version = raw_tag_name.startsWith('v') ? raw_tag_name.substring(1) : raw_tag_name; // Procesamos el tag aquí

            console.log(`Generating latest.json for version ${app_version} (from tag ${raw_tag_name}), release ID: ${release_id}`);

            const latestJson = {
              version: app_version,
              notes: `Release notes for TaL v${app_version}. See GitHub release for details.`, // Placeholder, se puede mejorar
              pub_date: new Date().toISOString(),
              platforms: {}
            };

            console.log("Fetching release assets...");
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id,
              per_page: 50 // Aumentar si tienes muchos assets por release
            });
            console.log(`Found ${assets.length} assets in release ID ${release_id}.`);

            function findAsset(pattern) {
              const asset = assets.find(a => pattern.test(a.name));
              if (asset) console.log(`Found asset for pattern ${pattern}: ${asset.name}`);
              else console.warn(`Asset NOT found for pattern: ${pattern}`);
              return asset;
            }

            // Función para leer firmas (simplificada, asume que el script corre en el mismo runner y tiene acceso)
            // ESTA PARTE ES LA MÁS COMPLICADA DE HACER GENÉRICA SI EL SCRIPT CORRE SOLO UNA VEZ
            // Y NECESITA ACCESO A ARCHIVOS GENERADOS EN DIFERENTES RUNNERS DE LA MATRIZ.
            // Por ahora, nos enfocaremos en que funcione para los artefactos del runner actual (Linux).
            function getSignatureFromLocalFile(sigFileNameOnRunner) {
              // Esta función intentará leer el archivo .sig del disco local del runner.
              // Esto solo funcionará para los artefactos construidos en ESTE MISMO JOB del runner.
              if (fs.existsSync(sigFileNameOnRunner)) {
                console.log(`Reading signature from local file: ${sigFileNameOnRunner}`);
                return fs.readFileSync(sigFileNameOnRunner, 'utf8').trim();
              } else {
                console.warn(`Local signature file NOT FOUND: ${sigFileNameOnRunner}`);
                return "LOCAL_SIGNATURE_FILE_NOT_FOUND";
              }
            }

            const productNameForFile = "Tu asistente Local"; // Nombre exacto como en los archivos generados
            const versionForFile = app_version;

            // --- Linux x86_64 (AppImage y Deb, generados en el runner de ubuntu-22.04) ---
            if (matrix.platform === 'ubuntu-22.04') {
              const appImageAsset = findAsset(new RegExp(`${productNameForFile.replace(/ /g, '\\.')}_${versionForFile}_amd64\\.AppImage$`));
              const debAsset = findAsset(new RegExp(`${productNameForFile.replace(/ /g, '\\.')}_${versionForFile}_amd64\\.deb$`));

              if (appImageAsset) {
                const sigPath = path.join('src-tauri', 'target', 'release', 'bundle', 'appimage', `${productNameForFile}_${versionForFile}_amd64.AppImage.sig`);
                latestJson.platforms["linux-x86_64"] = {
                  signature: getSignatureFromLocalFile(sigPath),
                  url: appImageAsset.browser_download_url,
                  size: appImageAsset.size
                };
              }
              if (debAsset && latestJson.platforms["linux-x86_64"]) { // Añadir info del .deb si existe AppImage
                const sigPathDeb = path.join('src-tauri', 'target', 'release', 'bundle', 'deb', `${productNameForFile}_${versionForFile}_amd64.deb.sig`);
                latestJson.platforms["linux-x86_64"].alt_installers = latestJson.platforms["linux-x86_64"].alt_installers || [];
                latestJson.platforms["linux-x86_64"].alt_installers.push({
                  type: "deb",
                  signature: getSignatureFromLocalFile(sigPathDeb),
                  url: debAsset.browser_download_url,
                  size: debAsset.size
                });
              } else if (debAsset) { // Si no hay AppImage, .deb es el principal
                 const sigPathDeb = path.join('src-tauri', 'target', 'release', 'bundle', 'deb', `${productNameForFile}_${versionForFile}_amd64.deb.sig`);
                 latestJson.platforms["linux-x86_64"] = {
                    signature: getSignatureFromLocalFile(sigPathDeb),
                    url: debAsset.browser_download_url,
                    size: debAsset.size
                 };
              }
            }

            // --- Windows x64 ---
            // Este bloque necesitaría ejecutarse en el runner de Windows o tener acceso a su .sig
            // Para el script actual, solo podemos poblar la URL y el tamaño. La firma sería un placeholder.
            const exeAsset = findAsset(new RegExp(`${productNameForFile.replace(/ /g, '\\.')}_${versionForFile}_x64-setup\\.exe$`));
            if (exeAsset) {
              latestJson.platforms["windows-x86_64"] = {
                signature: "SIGNATURE_FOR_WINDOWS_X64_NEEDS_ACCESS_TO_ITS_SIG_FILE",
                url: exeAsset.browser_download_url,
                size: exeAsset.size
              };
            }

            // --- macOS Apple Silicon (darwin-aarch64) ---
            const dmgAarch64Asset = findAsset(new RegExp(`${productNameForFile.replace(/ /g, '\\.')}_${versionForFile}_aarch64\\.dmg$`));
            if (dmgAarch64Asset) {
              latestJson.platforms["darwin-aarch64"] = {
                signature: "SIGNATURE_FOR_MACOS_AARCH64_NEEDS_ACCESS_TO_ITS_SIG_FILE",
                url: dmgAarch64Asset.browser_download_url,
                size: dmgAarch64Asset.size
              };
            }

            // --- macOS Intel (darwin-x86_64) ---
            const dmgX64Asset = findAsset(new RegExp(`${productNameForFile.replace(/ /g, '\\.')}_${versionForFile}_x64\\.dmg$`));
            if (dmgX64Asset) {
              latestJson.platforms["darwin-x86_64"] = {
                signature: "SIGNATURE_FOR_MACOS_X64_NEEDS_ACCESS_TO_ITS_SIG_FILE",
                url: dmgX64Asset.browser_download_url,
                size: dmgX64Asset.size
              };
            }

            console.log("Generated latest.json content:", JSON.stringify(latestJson, null, 2));

            const tempLatestJsonPath = path.join('./', 'latest.json'); // Guarda en la raíz del workspace del runner
            fs.writeFileSync(tempLatestJsonPath, JSON.stringify(latestJson, null, 2));

            // Borrar el 'latest.json' que pudo haber subido tauri-action (si subió alguno)
            const existingLatestJsonAsset = assets.find(asset => asset.name === 'latest.json');
            if (existingLatestJsonAsset) {
              console.log(`Found existing latest.json asset (ID: ${existingLatestJsonAsset.id}), attempting to delete.`);
              try {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingLatestJsonAsset.id
                });
                console.log('Successfully deleted existing latest.json asset.');
              } catch (error) {
                console.error('Error deleting existing latest.json asset:', error);
                // Continuar de todas formas, puede que el nuevo upload falle si el nombre choca y este no se borró.
              }
            }

            console.log('Uploading new latest.json...');
            try {
              const fileData = fs.readFileSync(tempLatestJsonPath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id,
                name: 'latest.json',
                data: fileData // Enviar el buffer de datos directamente
              });
              console.log('latest.json uploaded successfully.');
            } catch (error) {
              console.error('Error uploading new latest.json:', error);
              // Podrías añadir un `core.setFailed(error.message);` si quieres que el step falle
            }
